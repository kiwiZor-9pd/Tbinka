<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Private Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        t_yellow: '#FFDD2D',
                        t_grey_dark: '#1C1C1E',
                        t_grey_light: '#2C2C2E',
                        t_text_sec: '#8E8E93',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: black; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page-transition { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        function App() {
            const [db, setDb] = useState(JSON.parse(localStorage.getItem('bank_db')) || []);
            const [currentUserPhone, setCurrentUserPhone] = useState(localStorage.getItem('current_user_phone') || null);
            const [isLogged, setIsLogged] = useState(false);
            const [currentTab, setCurrentTab] = useState('main'); 

            const user = db.find(u => u.phone === currentUserPhone);

            useEffect(() => {
                localStorage.setItem('bank_db', JSON.stringify(db));
                if(currentUserPhone) localStorage.setItem('current_user_phone', currentUserPhone);
            }, [db, currentUserPhone]);

            const handleAuth = (e) => {
                e.preventDefault();
                const pin = e.target.pin.value;
                if (!user) {
                    const name = e.target.name.value;
                    const phone = "+7 900 " + Math.floor(100 + Math.random() * 899) + " " + Math.floor(10 + Math.random() * 89) + " " + Math.floor(10 + Math.random() * 89);
                    const newUser = {
                        name, pin, phone,
                        balance: 5000,
                        number: "2022 1927 1837 " + Math.floor(1000 + Math.random() * 9000),
                        history: []
                    };
                    setDb([...db, newUser]);
                    setCurrentUserPhone(phone);
                    setIsLogged(true);
                } else {
                    if (pin === user.pin) setIsLogged(true);
                    else alert("Неверный код доступа");
                }
            };

            const handleTransfer = (e) => {
                e.preventDefault();
                const targetInput = e.target.target.value.trim();
                const amt = Number(e.target.amount.value);
                
                if (amt <= 0 || user.balance < amt) return alert("Ошибка суммы или недостаточно средств");

                const recipient = db.find(u => u.phone === targetInput || u.number.replace(/\s/g, '') === targetInput.replace(/\s/g, ''));

                if (!recipient) return alert("Получатель не найден");
                if (recipient.phone === user.phone) return alert("Нельзя перевести самому себе");

                const newDb = db.map(u => {
                    if (u.phone === user.phone) {
                        return { ...u, balance: u.balance - amt, history: [{ id: Date.now(), title: recipient.name, amt: -amt, type: 'minus', date: 'Сегодня' }, ...u.history] };
                    }
                    if (u.phone === recipient.phone) {
                        return { ...u, balance: u.balance + amt, history: [{ id: Date.now(), title: user.name, amt: amt, type: 'plus', date: 'Сегодня' }, ...u.history] };
                    }
                    return u;
                });

                setDb(newDb);
                alert("Перевод выполнен");
                setCurrentTab('main');
            };

            const updateProfile = (field, value) => {
                if(!value) return;
                setDb(db.map(u => u.phone === user.phone ? { ...u, [field]: value } : u));
            };

            const deleteAccount = () => {
                if(confirm("Удалить аккаунт навсегда?")){
                    setDb(db.filter(u => u.phone !== user.phone));
                    setIsLogged(false);
                    setCurrentUserPhone(null);
                    localStorage.removeItem('current_user_phone');
                }
            };

            if (!isLogged) {
                return (
                    <div className="flex flex-col h-screen p-8 justify-center page-transition">
                        <div className="text-center mb-10">
                            <div className="w-16 h-16 bg-t_yellow rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-xl shadow-t_yellow/20">
                                <Icon name="shield" className="text-black" />
                            </div>
                            <h1 className="text-3xl font-bold tracking-tighter italic">{!user ? 'Регистрация' : 'Вход'}</h1>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            {!user && <input name="name" required placeholder="Имя Фамилия" className="w-full bg-t_grey_dark p-5 rounded-2xl outline-none border border-white/5" />}
                            <input name="pin" type="password" required placeholder="Код доступа" className="w-full bg-t_grey_dark p-5 rounded-2xl outline-none border border-white/5 text-center text-xl tracking-[0.5em]" />
                            <button className="w-full bg-t_yellow text-black font-bold py-5 rounded-2xl text-lg active:scale-95 transition-all">Войти</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen">
                    <header className="p-5 flex justify-between items-center bg-black/40 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-t_grey_dark flex items-center justify-center font-bold text-t_yellow border border-white/10">{user.name[0]}</div>
                            <div className="flex flex-col">
                                <span className="text-[10px] text-t_text_sec font-bold uppercase tracking-widest">{user.name}</span>
                                <span className="text-sm font-bold italic tracking-tight">{user.phone}</span>
                            </div>
                        </div>
                        <button onClick={() => setCurrentTab('settings')} className="p-2 bg-t_grey_dark rounded-full">
                            <Icon name="settings" className="text-t_text_sec" size={20}/>
                        </button>
                    </header>

                    <main className="flex-1 overflow-y-auto px-4 pb-32 no-scrollbar page-transition">
                        {currentTab === 'main' && (
                            <div>
                                <div className="bg-gradient-to-br from-t_grey_dark to-[#222] p-7 rounded-[2.5rem] border border-white/5 mb-8 mt-4 shadow-2xl relative overflow-hidden">
                                    <div className="flex justify-between items-start mb-12">
                                        <div className="flex flex-col">
                                            <span className="text-t_text_sec text-[10px] font-bold uppercase tracking-wider mb-1">Баланс счета</span>
                                            <h2 className="text-4xl font-bold italic">{user.balance.toLocaleString()} ₽</h2>
                                        </div>
                                        <div className="bg-t_yellow/90 w-10 h-7 rounded-md shadow-inner"></div>
                                    </div>
                                    <p className="font-mono text-t_text_sec text-sm tracking-[0.2em] italic opacity-60">•••• •••• •••• {user.number.slice(-4)}</p>
                                </div>

                                <button onClick={() => setCurrentTab('transfer')} className="w-full bg-t_grey_dark p-6 rounded-[2rem] flex items-center justify-center gap-4 border border-white/5 mb-8 active:scale-95 transition-all shadow-lg">
                                    <Icon name="repeat" className="text-t_yellow" /> 
                                    <span className="font-bold text-lg italic">Перевести</span>
                                </button>

                                <div className="flex justify-between items-center mb-5 px-2">
                                    <h3 className="text-xl font-bold italic tracking-tight">История событий</h3>
                                    <div className="h-1 w-12 bg-t_grey_light rounded-full"></div>
                                </div>
                                <div className="space-y-2">
                                    {user.history.length === 0 ? (
                                        <div className="text-center py-10 text-t_text_sec italic text-sm">Здесь будут ваши операции</div>
                                    ) : (
                                        user.history.map(item => (
                                            <div key={item.id} className="flex justify-between items-center p-5 bg-t_grey_dark/40 rounded-[1.5rem] border border-white/[0.03]">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${item.type === 'plus' ? 'bg-green-500/10 text-green-500' : 'bg-white/5 text-white'}`}>
                                                        <Icon name={item.type === 'plus' ? "arrow-down-left" : "arrow-up-right"} size={18}/>
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-[15px]">{item.title}</p>
                                                        <p className="text-[10px] text-t_text_sec uppercase font-medium">{item.date}</p>
                                                    </div>
                                                </div>
                                                <span className={`font-bold text-lg ${item.type === 'plus' ? 'text-green-500' : 'text-white'}`}>
                                                    {item.type === 'plus' ? '+' : ''}{item.amt.toLocaleString()}
                                                </span>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {currentTab === 'transfer' && (
                            <div className="py-4">
                                <h2 className="text-2xl font-bold mb-1 italic text-center">Новый перевод</h2>
                                <p className="text-center text-t_text_sec text-[10px] uppercase font-bold tracking-widest mb-10">Мгновенное зачисление</p>
                                <form onSubmit={handleTransfer} className="space-y-4 px-2">
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-t_text_sec font-bold uppercase ml-4">Получатель</label>
                                        <input name="target" required placeholder="Номер телефона или карты" className="w-full bg-t_grey_dark p-5 rounded-2xl outline-none border border-white/5 focus:border-t_yellow/30" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] text-t_text_sec font-bold uppercase ml-4">Сумма перевода</label>
                                        <input name="amount" type="number" required placeholder="0 ₽" className="w-full bg-t_grey_dark p-5 rounded-2xl outline-none border border-white/5 text-t_yellow text-3xl font-bold text-center" />
                                    </div>
                                    <button className="w-full bg-t_yellow text-black py-5 rounded-2xl font-bold text-lg mt-6 shadow-lg shadow-t_yellow/10 active:scale-95 transition-all">Отправить</button>
                                    <button type="button" onClick={() => setCurrentTab('main')} className="w-full text-t_text_sec font-bold py-4">Отмена</button>
                                </form>
                            </div>
                        )}

                        {currentTab === 'settings' && (
                            <div className="py-4 space-y-6 px-2">
                                <h2 className="text-2xl font-bold italic mb-6">Профиль и настройки</h2>
                                
                                {/* БЛОК ИНФО (ВМЕСТО РЕКВИЗИТОВ) */}
                                <div className="bg-t_grey_dark rounded-3xl border border-white/5 overflow-hidden">
                                    <div className="p-5 border-b border-white/5 flex justify-between items-center">
                                        <div>
                                            <p className="text-[10px] text-t_text_sec font-bold uppercase mb-1">Номер вашей карты</p>
                                            <p className="font-mono text-lg tracking-wider">{user.number}</p>
                                        </div>
                                        <Icon name="copy" size={18} className="text-t_yellow opacity-50"/>
                                    </div>
                                    <div className="p-5 flex justify-between items-center">
                                        <div>
                                            <p className="text-[10px] text-t_text_sec font-bold uppercase mb-1">Номер счета (телефон)</p>
                                            <p className="text-lg font-medium">{user.phone}</p>
                                        </div>
                                        <Icon name="phone" size={18} className="text-t_yellow opacity-50"/>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <div className="bg-t_grey_dark p-5 rounded-3xl border border-white/5 flex flex-col gap-1">
                                        <p className="text-[10px] text-t_text_sec uppercase font-bold">Имя пользователя</p>
                                        <input defaultValue={user.name} onBlur={(e) => updateProfile('name', e.target.value)} className="bg-transparent text-lg font-medium outline-none border-b border-white/5 focus:border-t_yellow pb-1 transition-all" />
                                    </div>
                                    <div className="bg-t_grey_dark p-5 rounded-3xl border border-white/5 flex flex-col gap-1">
                                        <p className="text-[10px] text-t_text_sec uppercase font-bold">Код доступа (PIN)</p>
                                        <input type="password" placeholder="••••" onBlur={(e) => e.target.value && updateProfile('pin', e.target.value)} className="bg-transparent text-lg font-medium outline-none border-b border-white/5 focus:border-t_yellow pb-1 transition-all" />
                                    </div>
                                    
                                    <div className="pt-6 flex flex-col gap-3">
                                        <button onClick={() => {setIsLogged(false); setCurrentTab('main');}} className="w-full bg-t_grey_light p-5 rounded-2xl font-bold border border-white/5 active:scale-95 transition-all">Выйти из системы</button>
                                        <button onClick={deleteAccount} className="w-full text-red-500 font-bold py-4 opacity-70 hover:opacity-100">Удалить аккаунт</button>
                                    </div>
                                    <button onClick={() => setCurrentTab('main')} className="w-full text-t_text_sec font-bold py-2">На главную</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Навигация (ТОЛЬКО 2 КНОПКИ ТЕПЕРЬ) */}
                    <nav className="fixed bottom-0 w-full bg-t_grey_dark/80 backdrop-blur-xl border-t border-white/5 p-4 flex justify-around items-center z-50">
                        <button onClick={() => setCurrentTab('main')} className={currentTab === 'main' ? 'text-t_yellow scale-110 transition-all' : 'text-t_text_sec opacity-50'}>
                            <Icon name="home" size={28}/>
                        </button>
                        <button onClick={() => setCurrentTab('transfer')} className={currentTab === 'transfer' ? 'text-t_yellow scale-110 transition-all' : 'text-t_text_sec opacity-50'}>
                            <Icon name="repeat" size={28}/>
                        </button>
                        <button onClick={() => setCurrentTab('settings')} className={currentTab === 'settings' ? 'text-t_yellow scale-110 transition-all' : 'text-t_text_sec opacity-50'}>
                            <Icon name="user" size={28}/>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
