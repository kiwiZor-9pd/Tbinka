<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Private Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        t_yellow: '#FFDD2D',
                        t_grey_dark: '#1C1C1E',
                        t_grey_light: '#2C2C2E',
                        t_text_sec: '#8E8E93',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: black; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page-anim { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        function App() {
            // Глобальная база данных всех пользователей в localStorage
            const [db, setDb] = useState(() => {
                const savedDb = localStorage.getItem('t_bank_database');
                return savedDb ? JSON.parse(savedDb) : [];
            });

            const [currentUserId, setCurrentUserId] = useState(sessionStorage.getItem('active_user_id'));
            const [tab, setTab] = useState('main');

            const user = db.find(u => u.id === Number(currentUserId));

            // Сохранение БД при любом изменении
            useEffect(() => {
                localStorage.setItem('t_bank_database', JSON.stringify(db));
            }, [db]);

            const handleAuth = (e) => {
                e.preventDefault();
                const name = e.target.name?.value;
                const pin = e.target.pin.value;

                if (!currentUserId && name) { // Регистрация нового
                    const newUser = {
                        id: Date.now(),
                        name,
                        pin,
                        phone: "+7 9" + Math.floor(100000000 + Math.random() * 900000000),
                        balance: 5000,
                        card: "2200 1902 " + Math.floor(1000 + Math.random() * 8999) + " " + Math.floor(1000 + Math.random() * 8999),
                        history: []
                    };
                    setDb([...db, newUser]);
                    setCurrentUserId(newUser.id);
                    sessionStorage.setItem('active_user_id', newUser.id);
                } else { // Вход
                    const found = db.find(u => u.pin === pin);
                    if (found) {
                        setCurrentUserId(found.id);
                        sessionStorage.setItem('active_user_id', found.id);
                    } else alert("Неверный ПИН-код");
                }
            };

            const processTransfer = (e) => {
                e.preventDefault();
                const targetStr = e.target.target.value.trim();
                const amount = Number(e.target.amount.value);

                if (amount > user.balance) return alert("Недостаточно средств");

                // Поиск в базе по телефону или карте
                const recipientIndex = db.findIndex(u => u.phone === targetStr || u.card.replace(/\s/g, '') === targetStr.replace(/\s/g, ''));

                if (recipientIndex === -1) return alert("Пользователь не найден в базе данных");
                if (db[recipientIndex].id === user.id) return alert("Нельзя перевести самому себе");

                const updatedDb = db.map((u, idx) => {
                    if (u.id === user.id) {
                        return { 
                            ...u, 
                            balance: u.balance - amount, 
                            history: [{ id: Date.now(), title: db[recipientIndex].name, amt: -amount, type: 'minus', date: 'Сегодня' }, ...u.history] 
                        };
                    }
                    if (idx === recipientIndex) {
                        return { 
                            ...u, 
                            balance: u.balance + amount, 
                            history: [{ id: Date.now() + 1, title: user.name, amt: amount, type: 'plus', date: 'Сегодня' }, ...u.history] 
                        };
                    }
                    return u;
                });

                setDb(updatedDb);
                alert("Перевод выполнен!");
                setTab('main');
            };

            const updateProfile = (field, val) => {
                setDb(db.map(u => u.id === user.id ? { ...u, [field]: val } : u));
            };

            const deleteAcc = () => {
                if(confirm("Удалить аккаунт и данные?")) {
                    setDb(db.filter(u => u.id !== user.id));
                    setCurrentUserId(null);
                    sessionStorage.clear();
                }
            };

            if (!user) {
                return (
                    <div className="flex flex-col h-screen p-10 justify-center bg-black page-anim">
                        <div className="mb-12 text-center">
                            <div className="w-16 h-16 bg-t_yellow rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-t_yellow/20">
                                <Icon name="lock" className="text-black" />
                            </div>
                            <h1 className="text-2xl font-bold italic tracking-tight">T-BANK Private</h1>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            {db.length === 0 && <input name="name" required placeholder="Имя Фамилия" className="w-full bg-t_grey_dark p-5 rounded-2xl outline-none border border-white/5" />}
                            <input name="pin" type="password" required placeholder="ПИН-код" className="w-full bg-t_grey_dark p-5 rounded-2xl outline-none border border-white/5 text-center text-2xl tracking-[0.5em]" />
                            <button className="w-full bg-t_yellow text-black font-bold py-5 rounded-2xl">Войти</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto">
                    <header className="p-6 flex justify-between items-center sticky top-0 bg-black/50 backdrop-blur-xl z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-t_grey_dark flex items-center justify-center font-bold text-t_yellow border border-white/10">{user.name[0]}</div>
                            <div>
                                <p className="text-[10px] text-t_text_sec font-bold uppercase tracking-widest">{user.name}</p>
                                <p className="text-sm font-bold italic">{user.phone}</p>
                            </div>
                        </div>
                        <button onClick={() => setTab('settings')} className="p-2 bg-t_grey_dark rounded-full"><Icon name="settings" size={20} className="text-t_text_sec"/></button>
                    </header>

                    <main className="flex-1 px-4 overflow-y-auto no-scrollbar pb-28 page-anim">
                        {tab === 'main' && (
                            <div>
                                <div className="bg-gradient-to-br from-t_grey_dark to-[#111] p-8 rounded-[2.5rem] border border-white/5 mb-8 mt-2 relative overflow-hidden shadow-2xl">
                                    <div className="flex justify-between items-start mb-12">
                                        <div>
                                            <p className="text-t_text_sec text-[10px] font-bold uppercase mb-1">Ваш баланс</p>
                                            <h2 className="text-4xl font-bold italic">{user.balance.toLocaleString()} ₽</h2>
                                        </div>
                                        <div className="w-10 h-7 bg-t_yellow/90 rounded shadow-inner"></div>
                                    </div>
                                    <p className="font-mono text-t_text_sec text-sm italic tracking-widest opacity-50">•••• •••• •••• {user.card.slice(-4)}</p>
                                </div>

                                <button onClick={() => setTab('transfer')} className="w-full bg-t_grey_dark p-6 rounded-[1.5rem] flex items-center justify-center gap-4 border border-white/5 mb-10 active:scale-95 transition-all">
                                    <Icon name="repeat" className="text-t_yellow" /> <span className="font-bold text-lg italic">Перевести</span>
                                </button>

                                <h3 className="text-xl font-bold italic mb-5 px-2">История</h3>
                                <div className="space-y-2">
                                    {user.history.map(item => (
                                        <div key={item.id} className="flex justify-between items-center p-5 bg-t_grey_dark/40 rounded-3xl border border-white/[0.02]">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${item.type === 'plus' ? 'bg-green-500/10 text-green-500' : 'bg-white/5 text-white'}`}>
                                                    <Icon name={item.type === 'plus' ? "arrow-down-left" : "arrow-up-right"} size={18}/>
                                                </div>
                                                <div><p className="font-bold text-[15px]">{item.title}</p><p className="text-[10px] text-t_text_sec font-medium uppercase">{item.date}</p></div>
                                            </div>
                                            <span className={`font-bold text-lg ${item.type === 'plus' ? 'text-green-500' : 'text-white'}`}>{item.amt > 0 ? '+' : ''}{item.amt.toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'transfer' && (
                            <div className="py-4">
                                <h2 className="text-2xl font-bold mb-8 italic text-center">Новый перевод</h2>
                                <form onSubmit={processTransfer} className="space-y-6">
                                    <input name="target" required placeholder="Номер телефона или карты" className="w-full bg-t_grey_dark p-5 rounded-2xl outline-none border border-white/5" />
                                    <input name="amount" type="number" required placeholder="0 ₽" className="w-full bg-t_grey_dark p-5 rounded-2xl outline-none border border-white/5 text-t_yellow text-3xl font-bold text-center" />
                                    <button className="w-full bg-t_yellow text-black py-5 rounded-2xl font-bold text-lg">Отправить</button>
                                    <button type="button" onClick={() => setTab('main')} className="w-full text-t_text_sec py-2">Отмена</button>
                                </form>
                            </div>
                        )}

                        {tab === 'settings' && (
                            <div className="py-4 space-y-6">
                                <h2 className="text-2xl font-bold italic">Настройки</h2>
                                <div className="space-y-3">
                                    <div className="bg-t_grey_dark p-5 rounded-3xl border border-white/5">
                                        <p className="text-[10px] text-t_text_sec font-bold uppercase mb-2">Номер вашей карты</p>
                                        <p className="font-mono text-lg">{user.card}</p>
                                    </div>
                                    <div className="bg-t_grey_dark p-5 rounded-3xl border border-white/5">
                                        <p className="text-[10px] text-t_text_sec font-bold uppercase mb-2">Изменить имя</p>
                                        <input defaultValue={user.name} onBlur={(e) => updateProfile('name', e.target.value)} className="bg-transparent border-b border-white/10 w-full outline-none pb-1 text-lg" />
                                    </div>
                                    <div className="bg-t_grey_dark p-5 rounded-3xl border border-white/5">
                                        <p className="text-[10px] text-t_text_sec font-bold uppercase mb-2">Новый ПИН-код</p>
                                        <input type="password" placeholder="••••" onBlur={(e) => e.target.value && updateProfile('pin', e.target.value)} className="bg-transparent border-b border-white/10 w-full outline-none pb-1 text-lg" />
                                    </div>
                                    <button onClick={() => {sessionStorage.clear(); location.reload();}} className="w-full bg-t_grey_light p-5 rounded-2xl font-bold">Выйти</button>
                                    <button onClick={deleteAcc} className="w-full text-red-500 font-bold py-2">Удалить аккаунт</button>
                                    <button onClick={() => setTab('main')} className="w-full text-t_text_sec py-2">Назад</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 w-full bg-black/80 backdrop-blur-2xl border-t border-white/5 p-6 flex justify-around items-center z-50">
                        <button onClick={() => setTab('main')} className={tab === 'main' ? 'text-t_yellow' : 'text-t_text_sec'}><Icon name="home" size={28}/></button>
                        <button onClick={() => setTab('transfer')} className={tab === 'transfer' ? 'text-t_yellow' : 'text-t_text_sec'}><Icon name="repeat" size={28}/></button>
                        <button onClick={() => setTab('settings')} className={tab === 'settings' ? 'text-t_yellow' : 'text-t_text_sec'}><Icon name="user" size={28}/></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
