<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: black; color: white; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .t-card-gradient { background: linear-gradient(135deg, #27272a 0%, #000000 100%); border: 1px solid rgba(255, 255, 255, 0.1); }
        .t-yellow-shadow { box-shadow: 0 10px 20px -5px rgba(250, 204, 21, 0.3); }
        .hidden { display: none !important; }
        input { outline: none; }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div id="app">
        <div id="auth-screen" class="flex flex-col h-screen p-8 justify-center items-center max-w-md mx-auto">
            <div class="w-20 h-20 bg-yellow-400 rounded-3xl mb-6 flex items-center justify-center t-yellow-shadow">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h1 id="auth-title" class="text-3xl font-black italic text-yellow-400 mb-2 tracking-tighter uppercase text-center">Регистрация</h1>
            
            <p id="total-users" class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mb-10">Загрузка данных...</p>
            
            <div class="w-full space-y-4">
                <div id="reg-fields" class="space-y-4">
                    <input id="reg-name" placeholder="Имя Фамилия" class="w-full bg-zinc-900/50 p-5 rounded-2xl border border-white/5">
                </div>
                <div id="login-fields" class="hidden space-y-4">
                    <input id="login-pcode" placeholder="Личный код (3 цифры)" class="w-full bg-zinc-900/50 p-5 rounded-2xl border border-white/5 text-center">
                </div>
                <input id="auth-pin" type="password" placeholder="ПИН-код" class="w-full bg-zinc-900/50 p-5 rounded-2xl text-center tracking-widest border border-white/5" maxlength="4">
                
                <button onclick="submitAuth()" id="auth-btn" class="w-full bg-yellow-400 text-black font-bold py-5 rounded-2xl t-yellow-shadow uppercase mt-4">Открыть счет</button>
                <button onclick="toggleAuthMode()" id="toggle-btn" class="w-full text-zinc-500 text-sm font-bold py-2">Уже есть аккаунт? Войти</button>
            </div>
        </div>

        <div id="main-screen" class="hidden max-w-md mx-auto flex flex-col h-screen">
            <header class="p-6 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="user-avatar" class="w-10 h-10 rounded-full bg-yellow-400 flex items-center justify-center font-bold text-black text-xl italic uppercase"></div>
                    <p id="user-name-top" class="font-bold text-sm"></p>
                </div>
                <button onclick="location.reload()" class="text-zinc-600 font-bold uppercase text-[10px] tracking-widest border border-zinc-800 px-3 py-1 rounded-full">Выйти</button>
            </header>

            <main class="flex-1 px-6 overflow-y-auto pb-20">
                <div id="view-main">
                    <div class="t-card-gradient p-8 rounded-[40px] relative overflow-hidden shadow-2xl mb-8">
                        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest mb-2 text-white/40">Баланс</p>
                        <h2 id="balance-disp" class="text-4xl font-black italic mb-10 tracking-tight text-white"></h2>
                        <div class="flex justify-between items-center opacity-40">
                            <p id="card-disp" class="font-mono text-xs tracking-widest uppercase"></p>
                            <span class="text-[10px] font-black italic">T-BANK</span>
                        </div>
                    </div>

                    <button onclick="showTransfer()" class="w-full bg-yellow-400 text-black py-6 rounded-[2rem] flex items-center justify-center gap-4 font-black italic t-yellow-shadow uppercase mb-10">
                        Перевести деньги
                    </button>

                    <div class="space-y-4">
                        <h3 class="font-bold italic text-zinc-500 text-[11px] px-2 uppercase tracking-widest">История</h3>
                        <div id="history-list" class="space-y-3 pb-10"></div>
                    </div>
                </div>

                <div id="view-transfer" class="hidden py-6 space-y-8 animate-in slide-in-from-bottom">
                    <h2 class="text-2xl font-black italic text-yellow-400 uppercase tracking-tighter">Перевод</h2>
                    <div class="space-y-10">
                        <div class="space-y-2">
                            <p class="text-[10px] text-zinc-600 font-bold px-2 uppercase tracking-widest">Номер телефона (из базы)</p>
                            <input id="target-phone" placeholder="+7 9xx xxx xx xx" class="w-full bg-zinc-900 p-5 rounded-2xl outline-none border border-white/5 text-xl">
                        </div>
                        <div class="text-center">
                            <input id="transfer-amount" type="number" placeholder="0 ₽" class="w-full bg-transparent text-6xl font-black text-center outline-none text-yellow-400">
                        </div>
                        <div class="space-y-4">
                            <button onclick="processTransfer()" class="w-full bg-yellow-400 text-black py-6 rounded-[2rem] font-black t-yellow-shadow text-lg uppercase">Оправить другу</button>
                            <button onclick="showMainView()" class="w-full text-zinc-500 font-bold py-2 text-sm uppercase">Назад</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kbawfxxnydhczyblwagm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6lMskE4Ar4WAZvwLMj-dlg_M2Z5KM3P';
        const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLoginMode = false;
        let currentUser = null;

        // ЗАГРУЗКА ОБЩЕГО КОЛИЧЕСТВА ПОЛЬЗОВАТЕЛЕЙ
        async function fetchTotalUsers() {
            const { count, error } = await supabase.from('users').select('*', { count: 'exact', head: true });
            if (!error) {
                document.getElementById('total-users').innerText = `Пользователей в сети: ${count || 0}`;
            }
        }
        fetchTotalUsers();

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Вход' : 'Регистрация';
            document.getElementById('reg-fields').classList.toggle('hidden');
            document.getElementById('login-fields').classList.toggle('hidden');
            document.getElementById('auth-btn').innerText = isLoginMode ? 'Войти' : 'Открыть счет';
            document.getElementById('toggle-btn').innerText = isLoginMode ? 'Создать аккаунт' : 'Уже есть аккаунт? Войти';
        }

        async function submitAuth() {
            const pin = document.getElementById('auth-pin').value;
            if(!pin) return alert("Введите ПИН!");

            if(isLoginMode) {
                const pcode = document.getElementById('login-pcode').value;
                const { data } = await supabase.from('users').select('*').eq('pin', pin).eq('personalCode', pcode).single();
                if(data) renderApp(data);
                else alert("Ошибка входа!");
            } else {
                const name = document.getElementById('reg-name').value;
                if(!name) return alert("Введите имя!");
                const pCode = Math.floor(100 + Math.random() * 899).toString();
                const phone = "+79" + Math.floor(100000000 + Math.random() * 900000000);
                const { data, error } = await supabase.from('users').insert([{
                    name, pin, personalCode: pCode, balance: 15000,
                    phone: phone, card: "2200 1902 " + Math.floor(1000 + Math.random() * 8999), history: []
                }]).select();
                if(data) {
                    alert(`УСПЕХ! Твой телефон для переводов: ${phone}\nТвой личный код входа: ${pCode}`);
                    renderApp(data[0]);
                } else alert("Ошибка базы данных!");
            }
        }

        function renderApp(user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('user-name-top').innerText = user.name;
            document.getElementById('user-avatar').innerText = user.name[0];
            document.getElementById('balance-disp').innerText = user.balance.toLocaleString() + " ₽";
            document.getElementById('card-disp').innerText = user.card;
            updateHistoryUI(user.history);
        }

        function updateHistoryUI(history) {
            const list = document.getElementById('history-list');
            list.innerHTML = history && history.length ? '' : '<div class="text-center py-10 opacity-20 italic">Транзакций нет</div>';
            if(history) {
                history.forEach(h => {
                    list.innerHTML += `
                    <div class="bg-zinc-900/40 p-5 rounded-3xl flex justify-between items-center border border-white/[0.03]">
                        <div><p class="text-sm font-bold text-white">${h.title}</p><p class="text-[10px] text-zinc-600">${h.date}</p></div>
                        <span class="font-bold ${h.type === 'plus' ? 'text-green-500' : 'text-white'}">${h.type === 'plus' ? '+' : ''}${h.amt.toLocaleString()} ₽</span>
                    </div>`;
                });
            }
        }

        function showTransfer() {
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-transfer').classList.remove('hidden');
        }

        function showMainView() {
            document.getElementById('view-transfer').classList.add('hidden');
            document.getElementById('view-main').classList.remove('hidden');
        }

        async function processTransfer() {
            const targetPhone = document.getElementById('target-phone').value.trim();
            const amount = Number(document.getElementById('transfer-amount').value);
            
            if(amount <= 0 || amount > currentUser.balance) return alert("Недостаточно средств!");
            
            // ПОИСК ПО ВСЕЙ БАЗЕ SUPABASE
            const { data: recipient, error } = await supabase.from('users').select('*').eq('phone', targetPhone).single();
            
            if(!recipient) return alert("Пользователь с таким телефоном не найден в базе!");

            const date = new Date().toLocaleDateString('ru-RU');
            
            // Обновляем отправителя
            const myHistory = [{title: `Перевод: ${recipient.name}`, amt: -amount, type: 'minus', date}, ...(currentUser.history || [])];
            const { data: updatedMe } = await supabase.from('users').update({ balance: currentUser.balance - amount, history: myHistory }).eq('id', currentUser.id).select().single();

            // Обновляем получателя
            const targetHistory = [{title: `От: ${currentUser.name}`, amt: amount, type: 'plus', date}, ...(recipient.history || [])];
            await supabase.from('users').update({ balance: recipient.balance + amount, history: targetHistory }).eq('id', recipient.id);

            alert("ДЕНЬГИ ОТПРАВЛЕНЫ!");
            renderApp(updatedMe);
            showMainView();
        }
    </script>
</body>
</html>
