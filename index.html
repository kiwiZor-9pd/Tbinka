<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ВСЁ УЖЕ ПОДКЛЮЧЕНО:
        const SUPABASE_URL = 'https://kbawfxxnydhczyblwagm.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_6lMskE4Ar4WAZvwLMj-dlg_M2Z5KM3P';
        
        const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Icon = ({ name, size = 24 }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{width: size, height: size}}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [mode, setMode] = useState('reg');

            const handleReg = async (e) => {
                e.preventDefault();
                setLoading(true);
                const name = e.target.name.value;
                const pin = e.target.pin.value;
                const pCode = Math.floor(100 + Math.random() * 899).toString();
                const phone = "+7 9" + Math.floor(100000000 + Math.random() * 900000000);

                const { data, error } = await supabase.from('users').insert([{
                    name, pin, personalCode: pCode, phone, balance: 15000, 
                    card: "2200 1902 " + Math.floor(1000 + Math.random() * 8999),
                    history: []
                }]).select();

                if (error) {
                    alert("ОШИБКА: Проверь, создал ли ты таблицу 'users' в Supabase и ВЫКЛЮЧИЛ ли RLS!");
                } else {
                    alert("ГОТОВО! Твой личный код: " + pCode);
                    setUser(data[0]);
                }
                setLoading(false);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { data } = await supabase.from('users')
                    .select().eq('pin', e.target.pin.value).eq('personalCode', e.target.pCode.value).single();
                if (data) setUser(data);
                else alert("Неверный ПИН или Код!");
                setLoading(false);
            };

            if (loading) return <div className="h-screen flex items-center justify-center italic text-yellow-400">Связь с банком...</div>;

            if (!user) {
                return (
                    <div className="flex flex-col h-screen p-10 justify-center bg-black">
                        <div className="text-center mb-10 text-yellow-400 font-bold italic text-2xl">T-BANK CLOUD</div>
                        {mode === 'reg' ? (
                            <form onSubmit={handleReg} className="space-y-4">
                                <input name="name" required placeholder="Имя Фамилия" className="w-full bg-zinc-900 p-5 rounded-2xl outline-none" />
                                <input name="pin" type="password" required placeholder="ПИН (4 цифры)" className="w-full bg-zinc-900 p-5 rounded-2xl outline-none text-center" />
                                <button className="w-full bg-yellow-400 text-black font-bold py-5 rounded-2xl">Создать счет</button>
                                <button type="button" onClick={() => setMode('login')} className="w-full text-zinc-500 text-sm mt-4">Уже есть счет? Войти</button>
                            </form>
                        ) : (
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input name="pin" type="password" required placeholder="ПИН" className="w-full bg-zinc-900 p-5 rounded-2xl outline-none text-center" />
                                <input name="pCode" type="password" required placeholder="Личный код" className="w-full bg-zinc-900 p-5 rounded-2xl outline-none text-center" />
                                <button className="w-full bg-yellow-400 text-black font-bold py-5 rounded-2xl">Войти</button>
                                <button type="button" onClick={() => setMode('reg')} className="w-full text-zinc-500 text-sm mt-4">Регистрация</button>
                            </form>
                        )}
                    </div>
                );
            }

            return (
                <div className="p-6">
                    <div className="bg-zinc-900 p-8 rounded-[2rem] mb-6 border border-white/10">
                        <p className="text-zinc-500 text-[10px] font-bold uppercase mb-1">Баланс</p>
                        <h2 className="text-4xl font-bold italic">{user.balance.toLocaleString()} ₽</h2>
                    </div>
                    <div className="p-6 bg-zinc-900/50 rounded-3xl border border-white/5 text-center">
                        <p className="text-zinc-500 text-xs mb-2 italic text-yellow-400">Ваш номер телефона:</p>
                        <p className="text-2xl font-bold">{user.phone}</p>
                    </div>
                    <button onClick={() => setUser(null)} className="w-full mt-10 text-zinc-600 text-xs font-bold uppercase">Выйти</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
