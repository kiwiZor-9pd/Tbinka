<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: black; color: white; margin: 0; }
        input { border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ДАННЫЕ ИЗ ТВОИХ СКРИНШОТОВ
        const SUPABASE_URL = 'https://kbawfxxnydhczyblwagm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6lMskE4Ar4WAZvwLMj-dlg_M2Z5KM3P';
        const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [user, setUser] = useState(null);
            const [mode, setMode] = useState('reg');
            const [loading, setLoading] = useState(false);

            const handleReg = async (e) => {
                e.preventDefault();
                setLoading(true);
                const name = e.target.name.value;
                const pin = e.target.pin.value;
                const pCode = Math.floor(100 + Math.random() * 899).toString();
                const phone = "+7 9" + Math.floor(100000000 + Math.random() * 900000000);

                const { data, error } = await supabase.from('users').insert([{
                    name, pin, personalCode: pCode, phone, balance: 15000, 
                    card: "2200 1902 " + Math.floor(1000 + Math.random() * 8999),
                    history: []
                }]).select();

                if (error) {
                    alert("Ошибка: " + error.message);
                } else {
                    alert("Успех! Твой Код: " + pCode);
                    setUser(data[0]);
                }
                setLoading(false);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { data, error } = await supabase.from('users')
                    .select('*').eq('pin', e.target.pin.value).eq('personalCode', e.target.pCode.value).single();
                
                if (data) setUser(data);
                else alert("Неверные данные!");
                setLoading(false);
            };

            if (loading) return <div style={{display:'flex', height:'100vh', alignItems:'center', justifyContent:'center'}}>Загрузка...</div>;

            if (!user) {
                return (
                    <div style={{padding: '40px', display: 'flex', flexDirection: 'column', gap: '20px', maxWidth: '400px', margin: 'auto'}}>
                        <h1 style={{color: '#facc15', textAlign: 'center', fontSize: '24px', fontWeight: 'bold'}}>T-BANK CLOUD</h1>
                        {mode === 'reg' ? (
                            <form onSubmit={handleReg} style={{display: 'flex', flexDirection: 'column', gap: '15px'}}>
                                <input name="name" required placeholder="Имя Фамилия" style={{background: '#18181b', padding: '15px', borderRadius: '12px', color: 'white'}} />
                                <input name="pin" type="password" required placeholder="ПИН (4 цифры)" style={{background: '#18181b', padding: '15px', borderRadius: '12px', color: 'white', textAlign: 'center'}} />
                                <button style={{background: '#facc15', color: 'black', padding: '15px', borderRadius: '12px', fontWeight: 'bold'}}>Создать счет</button>
                                <button type="button" onClick={() => setMode('login')} style={{color: '#71717a', fontSize: '14px'}}>Уже есть счет? Войти</button>
                            </form>
                        ) : (
                            <form onSubmit={handleLogin} style={{display: 'flex', flexDirection: 'column', gap: '15px'}}>
                                <input name="pin" type="password" required placeholder="ПИН" style={{background: '#18181b', padding: '15px', borderRadius: '12px', color: 'white', textAlign: 'center'}} />
                                <input name="pCode" placeholder="Личный код" required style={{background: '#18181b', padding: '15px', borderRadius: '12px', color: 'white', textAlign: 'center'}} />
                                <button style={{background: '#facc15', color: 'black', padding: '15px', borderRadius: '12px', fontWeight: 'bold'}}>Войти</button>
                                <button type="button" onClick={() => setMode('reg')} style={{color: '#71717a', fontSize: '14px'}}>Регистрация</button>
                            </form>
                        )}
                    </div>
                );
            }

            return (
                <div style={{padding: '20px'}}>
                    <div style={{background: '#18181b', padding: '30px', borderRadius: '24px', border: '1px solid rgba(255,255,255,0.1)'}}>
                        <p style={{color: '#71717a', fontSize: '12px'}}>Баланс</p>
                        <h2 style={{fontSize: '32px', fontWeight: 'bold'}}>{user.balance.toLocaleString()} ₽</h2>
                        <p style={{fontSize: '12px', marginTop: '10px', color: '#71717a'}}>{user.card}</p>
                    </div>
                    <div style={{marginTop: '20px', padding: '20px', background: 'rgba(255,255,255,0.05)', borderRadius: '20px'}}>
                        <p style={{fontSize: '14px'}}><b>Владелец:</b> {user.name}</p>
                        <p style={{fontSize: '14px'}}><b>Телефон:</b> {user.phone}</p>
                    </div>
                    <button onClick={() => window.location.reload()} style={{marginTop: '40px', width: '100%', color: '#52525b'}}>Выйти</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
